# .github/workflows/ci.yml
#
# WHAT THIS FILE DOES:
# This is our Continuous Integration (CI) workflow.
# It runs automatically every time code is pushed to GitHub.
#
# WHY CI MATTERS:
# Without CI, bugs only get caught when someone manually runs tests.
# With CI, every single push is automatically checked — lint errors,
# failing tests, broken imports. If anything fails, GitHub marks
# the commit with a red X so you know immediately.
#
# This is standard practice at every serious tech company.
# Having this in your portfolio shows you understand professional
# software development workflows.

name: CI

on:
  # Run on every push to main
  push:
    branches: [main]
  # Also run on pull requests targeting main
  # This catches bugs BEFORE they merge, not after
  pull_request:
    branches: [main]

jobs:
  test:
    # Use the latest Ubuntu — same OS GitHub Actions uses for free
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your code onto the Actions runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python 3.13
      # We pin the exact version to avoid surprises if GitHub
      # changes the default Python version
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Step 3: Install all dependencies from requirements.txt
      # --no-cache-dir keeps the runner clean
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run ruff linter
      # Ruff checks for code style issues, unused imports, syntax errors.
      # If ruff fails, the whole CI job fails — no bad code gets through.
      - name: Lint with ruff
        run: ruff check src/ tests/

      # Step 5: Run the full test suite with coverage
      # --cov=src generates a coverage report for the src/ folder
      # --cov-report=term-missing prints uncovered line numbers
      # --cov-fail-under=80 fails CI if coverage drops below 80%
      - name: Run tests with coverage
        run: |
          PYTHONPATH=. pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=13
